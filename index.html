<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="theme-color" content="#f4b58a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>GDIED</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #2a1d2e;
    font-family: 'Press Start 2P', system-ui, sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
    overscroll-behavior: none;
    position: fixed;
    inset: 0;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    /* dreamy dawn backdrop behind the playfield */
    background:
      radial-gradient(ellipse at 30% 10%, #ffd2b0 0%, transparent 55%),
      radial-gradient(ellipse at 70% 90%, #a673c2 0%, transparent 60%),
      linear-gradient(180deg, #4a2e5a 0%, #2a1d2e 100%);
  }
  #stage {
    position: relative;
    /* Full-bleed by default (mobile-first) */
    width: 100vw;
    width: 100dvw;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }
  /* Desktop / large viewports: framed game-window, centered, with 9:16 aspect */
  @media (min-width: 700px) and (min-height: 700px) and (pointer: fine) {
    #stage {
      width: min(480px, calc(100dvh * 9 / 16));
      height: min(854px, calc(100vw * 16 / 9));
      max-width: 480px;
      max-height: 854px;
      box-shadow:
        0 0 0 4px #1a0f1f,
        0 0 0 8px #f4b58a,
        0 30px 80px rgba(0,0,0,.6),
        inset 0 0 0 1px rgba(255,255,255,.1);
      border-radius: 2px;
    }
  }
  canvas#game {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }

  /* HUD score (visible during play) */
  #score {
    position: absolute;
    top: max(5%, calc(env(safe-area-inset-top, 0px) + 14px));
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(24px, 7vw, 44px);
    color: #fff;
    text-shadow:
      3px 3px 0 #4a2e5a,
      -2px -2px 0 #4a2e5a,
      2px -2px 0 #4a2e5a,
      -2px 2px 0 #4a2e5a,
      0 6px 0 rgba(0,0,0,.25);
    letter-spacing: 2px;
    pointer-events: none;
    z-index: 4;
    transition: opacity .2s;
    opacity: 0;
  }
  #score.show { opacity: 1; }

  /* overlay screens */
  .screen {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6%;
    color: #4a2e5a;
  }
  .screen.show { display: flex; }
  .screen .panel {
    background: linear-gradient(180deg, #fff1d6 0%, #ffd6a8 100%);
    border: 4px solid #4a2e5a;
    box-shadow:
      0 0 0 4px #fff1d6,
      0 0 0 8px #4a2e5a,
      8px 12px 0 rgba(0,0,0,.25);
    padding: 28px 22px 22px;
    width: 86%;
    max-width: 340px;
    image-rendering: pixelated;
  }
  .screen h1 {
    font-size: clamp(20px, 6.5vw, 30px);
    color: #4a2e5a;
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-shadow: 3px 3px 0 #f4b58a;
  }
  .screen h2 {
    font-size: clamp(14px, 4.4vw, 20px);
    color: #4a2e5a;
    letter-spacing: 1px;
    margin-bottom: 18px;
  }
  .stats {
    display: flex;
    justify-content: space-around;
    gap: 10px;
    margin: 6px 0 18px;
  }
  .stat {
    background: #ffe6c2;
    border: 3px solid #4a2e5a;
    padding: 8px 10px;
    flex: 1;
  }
  .stat .lbl { font-size: 9px; color: #4a2e5a; opacity: .75; margin-bottom: 6px; letter-spacing: 1px; }
  .stat .val { font-size: clamp(16px, 5vw, 22px); color: #b34a1f; }
  .stat.best .val { color: #4a2e5a; }
  .stat.best.new .val::after {
    content: ' NEW!';
    font-size: 9px;
    color: #b34a1f;
    margin-left: 4px;
  }

  .btn {
    display: inline-block;
    margin-top: 6px;
    font-family: inherit;
    font-size: clamp(11px, 3.4vw, 14px);
    letter-spacing: 2px;
    color: #fff1d6;
    background: #b34a1f;
    border: 4px solid #4a2e5a;
    padding: 12px 22px;
    cursor: pointer;
    box-shadow:
      inset 0 -4px 0 rgba(0,0,0,.25),
      4px 6px 0 #4a2e5a;
    transition: transform .05s, box-shadow .05s;
  }
  .btn:active {
    transform: translate(3px, 4px);
    box-shadow:
      inset 0 -4px 0 rgba(0,0,0,.25),
      1px 2px 0 #4a2e5a;
  }
  .hint {
    margin-top: 14px;
    font-size: 10px;
    color: #4a2e5a;
    opacity: .8;
    letter-spacing: 1px;
  }
  .hint .key {
    display: inline-block;
    background: #4a2e5a;
    color: #fff1d6;
    padding: 3px 6px;
    margin: 0 2px;
  }

  /* tiny goat-tap hint that bobs */
  .tap-hint {
    margin-top: 18px;
    font-size: 12px;
    color: #fff1d6;
    text-shadow: 2px 2px 0 #4a2e5a;
    animation: bob 1s ease-in-out infinite;
  }
  @keyframes bob {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* flash on death */
  #flash {
    position: absolute;
    inset: 0;
    background: #ff0000;
    opacity: 0;
    pointer-events: none;
    z-index: 3;
  }
  #flash.flash { animation: flashAnim .4s ease-out; }
  @keyframes flashAnim {
    0% { opacity: .85; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="flash"></div>
    <div id="score">0</div>

    <div id="ready" class="screen show">
      <div class="panel">
        <h1>GDIED</h1>
        <h2>Mind the knives</h2>
        <div style="margin: 10px 0 14px; font-size: 10px; line-height: 1.8; color: #4a2e5a; opacity: .85;">
          Tap the goat.<br>
          Steer the goat between<br>the blades. Don't get sliced.
        </div>
        <button class="btn" id="playBtn">PLAY</button>
        <div class="hint">
          <span class="key">TAP</span> /
          <span class="key">CLICK</span> /
          <span class="key">SPACE</span>
        </div>
      </div>
    </div>

    <div id="gameover" class="screen">
      <div class="panel">
        <h1>GAME OVER</h1>
        <div class="stats">
          <div class="stat"><div class="lbl">SCORE</div><div class="val" id="finalScore">0</div></div>
          <div class="stat best" id="bestStat"><div class="lbl">BEST</div><div class="val" id="bestScore">0</div></div>
        </div>
        <button class="btn" id="retryBtn">PLAY AGAIN</button>
      </div>
    </div>
  </div>

<script>
(() => {
  // ---------- ASSETS (embedded) ----------
  const GOAT_SRC  = 'assets/goat.svg';
  const KNIFE_SRC = 'assets/knife.svg';
  const STEAK_SRC = 'assets/steak.png';
  const BBQ_SRC   = 'assets/bbq.png';

  const goatImg  = new Image();
  const knifeImg = new Image();
  const steakImg = new Image();
  const bbqImg   = new Image();
  let assetsLoaded = 0;
  const onLoad = () => {
    assetsLoaded++;
    if (assetsLoaded === 4) start();
  };
  goatImg.onload  = onLoad;
  knifeImg.onload = onLoad;
  steakImg.onload = onLoad;
  bbqImg.onload   = onLoad;
  goatImg.src  = GOAT_SRC;
  knifeImg.src = KNIFE_SRC;
  steakImg.src = STEAK_SRC;
  bbqImg.src   = BBQ_SRC;

  // ---------- CANVAS SETUP ----------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // Logical playfield size. W stays fixed for consistent feel; H adapts to viewport aspect.
  const W = 400;
  let H = 711; // initial portrait default; recomputed in resize()

  function resize() {
    const stage = document.getElementById('stage');
    const rect = stage.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    // Derive logical H from the real viewport's aspect ratio so the canvas
    // fills the screen without distortion. Clamp to a sensible portrait range.
    const oldH = H;
    const aspect = rect.height / Math.max(1, rect.width);
    H = Math.round(W * aspect);
    H = Math.max(600, Math.min(1100, H));
    GROUND_TOP = H - GROUND_H;

    // Rescale live entities so a viewport change (rotation, URL-bar toggle)
    // doesn't suddenly send the goat into the ground or pipes off-screen.
    if (oldH && oldH !== H) {
      const r = H / oldH;
      if (typeof goat !== 'undefined' && goat) goat.y *= r;
      if (typeof pipes !== 'undefined') pipes.forEach(p => { p.gapY *= r; });
      if (typeof clouds !== 'undefined') clouds.forEach(c => { c.y *= r; });
    }

    canvas.width  = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    // We draw in logical units; scale ctx so (W,H) maps to the canvas.
    ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
    ctx.imageSmoothingEnabled = true; // goat looks better smooth
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 100));

  // ---------- GAME CONSTANTS ----------
  const GROUND_H = 90;
  let   GROUND_TOP = H - GROUND_H; // recomputed in resize()

  const GRAVITY = 0.42;
  const JUMP_VEL = -7.6;
  const MAX_FALL = 11;

  const PIPE_SPEED = 2.4;
  const PIPE_GAP = 178;
  const PIPE_INTERVAL_PX = 230; // horizontal distance between pairs
  const PIPE_W = 70;            // visible knife width
  const PIPE_H = 320;           // visible knife sprite height
  const PIPE_MIN_TOP = 70;      // gap top stays this far below ceiling
  const PIPE_MIN_BOT = 70;      // gap bottom stays this far above ground

  // Hitbox is tighter than the visual to feel fair
  const KNIFE_HITBOX_W = 36;

  const STEAK_DRAW = 38;   // draw size (square)
  const STEAK_HIT  = 28;   // collect hitbox size
  const STEAK_EVERY = 10;  // collectible appears every N knives scored

  // Goat draw size (keep aspect ratio of the image)
  const GOAT_DRAW_W = 78;
  const GOAT_DRAW_H = 62;
  // Hitbox tighter than the sprite (the legs/horns shouldn't kill you)
  const GOAT_HIT_W = 50;
  const GOAT_HIT_H = 40;

  // ---------- STATE ----------
  let state = 'ready'; // ready | playing | gameover
  let score = 0;
  let best = (() => {
    try { return parseInt(localStorage.getItem('flappyGoatBest') || '0', 10) || 0; }
    catch (e) { return 0; }
  })();

  let goat = { x: 110, y: H * 0.45, vy: 0, rot: 0, flap: 0 };
  let pipes = [];   // {x, gapY, scored}
  let clouds = [];  // {x,y,scale,speed}
  let groundOffset = 0;
  let bobT = 0;     // for idle bob in ready state

  function reset() {
    goat = { x: 110, y: H * 0.45, vy: 0, rot: 0, flap: 0 };
    pipes = [];
    spawnPipe(W + 80);
    spawnPipe(W + 80 + PIPE_INTERVAL_PX);
    spawnPipe(W + 80 + PIPE_INTERVAL_PX * 2);
    score = 0;
    groundOffset = 0;
    setScoreVisible(false);
    updateScoreText();
  }

  function spawnPipe(x) {
    const minY = PIPE_MIN_TOP;
    const maxY = GROUND_TOP - PIPE_MIN_BOT - PIPE_GAP;
    const gapY = minY + Math.random() * (maxY - minY);
    pipes.push({ x, gapY, scored: false, hasSteak: false, steakCollected: false });
  }

  // Generate some lazy clouds
  function initClouds() {
    clouds = [];
    for (let i = 0; i < 5; i++) {
      clouds.push({
        x: Math.random() * W,
        y: 40 + Math.random() * (GROUND_TOP - 200),
        scale: 0.6 + Math.random() * 0.8,
        speed: 0.15 + Math.random() * 0.25
      });
    }
  }

  // ---------- INPUT ----------
  function flap() {
    if (state === 'ready') {
      setScreen('ready', false);
      setScoreVisible(true);
      state = 'playing';
      goat.vy = JUMP_VEL;
      goat.flap = 1;
    } else if (state === 'playing') {
      goat.vy = JUMP_VEL;
      goat.flap = 1;
    } else if (state === 'gameover') {
      // small debounce
      if (performance.now() - deathAt > 500) startGame();
    }
  }

  let deathAt = 0;

  // Pointer/touch: ignore taps on buttons inside overlay
  function onPointer(e) {
    if (e.target && e.target.closest && e.target.closest('.btn,.screen .panel')) return;
    e.preventDefault();
    flap();
  }
  window.addEventListener('pointerdown', onPointer, { passive: false });
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      flap();
    }
  });

  document.getElementById('playBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    startGame();
  });
  document.getElementById('retryBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    startGame();
  });

  function startGame() {
    reset();
    setScreen('ready', false);
    setScreen('gameover', false);
    setScoreVisible(true);
    state = 'playing';
    goat.vy = JUMP_VEL;
    goat.flap = 1;
  }

  // ---------- HELPERS ----------
  function setScreen(id, show) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.toggle('show', show);
  }
  function setScoreVisible(v) {
    document.getElementById('score').classList.toggle('show', v);
  }
  function updateScoreText() {
    document.getElementById('score').textContent = score;
  }
  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

  // ---------- UPDATE ----------
  function update(dt) {
    bobT += dt;

    if (state === 'ready') {
      // Idle bob
      goat.y = H * 0.45 + Math.sin(bobT * 0.005) * 10;
      goat.rot = Math.sin(bobT * 0.005) * 0.08;
      // ground & clouds still drift
      groundOffset = (groundOffset + PIPE_SPEED * 0.5) % 40;
      clouds.forEach(c => { c.x -= c.speed; if (c.x < -60) { c.x = W + 60; c.y = 40 + Math.random() * (GROUND_TOP - 200); }});
      return;
    }

    if (state === 'playing') {
      // Goat physics
      goat.vy = Math.min(goat.vy + GRAVITY, MAX_FALL);
      goat.y += goat.vy;
      goat.rot = clamp(goat.vy * 0.06, -0.35, 1.15);
      if (goat.flap > 0) goat.flap = Math.max(0, goat.flap - dt * 0.005);

      // Pipes
      pipes.forEach(p => { p.x -= PIPE_SPEED; });
      const last = pipes[pipes.length - 1];
      if (last.x < W - PIPE_INTERVAL_PX) spawnPipe(last.x + PIPE_INTERVAL_PX);
      pipes = pipes.filter(p => p.x > -PIPE_W - 20);

      // Score: goat fully past the pipe center
      pipes.forEach(p => {
        if (!p.scored && p.x + PIPE_W / 2 < goat.x) {
          p.scored = true;
          score++;
          updateScoreText();
          // Tag next upcoming pipe with a steak every STEAK_EVERY knives
          if (score % STEAK_EVERY === 0) {
            const next = pipes.find(np => !np.scored && np.x > goat.x);
            if (next) { next.hasSteak = true; next.steakCollected = false; next.steakType = Math.random() < 0.5 ? 'steak' : 'bbq'; }
          }
        }
      });

      // Clouds
      clouds.forEach(c => { c.x -= c.speed; if (c.x < -60) { c.x = W + 60; c.y = 40 + Math.random() * (GROUND_TOP - 200); }});

      // Ground scroll
      groundOffset = (groundOffset + PIPE_SPEED) % 40;

      // Collisions
      // Ground
      if (goat.y + GOAT_HIT_H / 2 >= GROUND_TOP) {
        goat.y = GROUND_TOP - GOAT_HIT_H / 2;
        gameOver();
        return;
      }
      // Ceiling: clamp, don't kill
      if (goat.y - GOAT_HIT_H / 2 < 0) {
        goat.y = GOAT_HIT_H / 2;
        if (goat.vy < 0) goat.vy = 0;
      }
      // Knives
      const gx = goat.x, gy = goat.y;
      const gL = gx - GOAT_HIT_W / 2, gR = gx + GOAT_HIT_W / 2;
      const gT = gy - GOAT_HIT_H / 2, gB = gy + GOAT_HIT_H / 2;
      for (const p of pipes) {
        const px = p.x;
        const kL = px + (PIPE_W - KNIFE_HITBOX_W) / 2;
        const kR = kL + KNIFE_HITBOX_W;
        if (gR < kL || gL > kR) continue;
        // top knife hitbox: from ceiling to gapY
        if (gT < p.gapY) { gameOver(); return; }
        // bottom knife hitbox: from gapY+PIPE_GAP down
        if (gB > p.gapY + PIPE_GAP) { gameOver(); return; }
      }

      // Steak collection
      const half = STEAK_HIT / 2;
      for (const p of pipes) {
        if (!p.hasSteak || p.steakCollected) continue;
        const sx = p.x + PIPE_W / 2;
        const sy = p.gapY + PIPE_GAP / 2;
        if (gR > sx - half && gL < sx + half && gB > sy - half && gT < sy + half) {
          p.steakCollected = true;
          score += 5;
          updateScoreText();
        }
      }
    }

    if (state === 'gameover') {
      // Goat keeps falling until it hits the ground
      if (goat.y + GOAT_HIT_H / 2 < GROUND_TOP) {
        goat.vy = Math.min(goat.vy + GRAVITY, MAX_FALL);
        goat.y += goat.vy;
        goat.rot = clamp(goat.rot + 0.04, -0.35, 1.5);
      } else {
        goat.y = GROUND_TOP - GOAT_HIT_H / 2;
      }
    }
  }

  function gameOver() {
    if (state === 'gameover') return;
    state = 'gameover';
    deathAt = performance.now();
    // flash
    const f = document.getElementById('flash');
    f.classList.remove('flash');
    void f.offsetWidth;
    f.classList.add('flash');

    // best
    const isNew = score > best;
    if (isNew) {
      best = score;
      try { localStorage.setItem('flappyGoatBest', String(best)); } catch (e) {}
    }
    document.getElementById('finalScore').textContent = score;
    document.getElementById('bestScore').textContent = best;
    document.getElementById('bestStat').classList.toggle('new', isNew);

    // Show after a short beat so the impact feels punchy
    setTimeout(() => {
      setScoreVisible(false);
      setScreen('gameover', true);
    }, 650);
  }

  // ---------- DRAW ----------
  function drawSky() {
    const g = ctx.createLinearGradient(0, 0, 0, GROUND_TOP);
    g.addColorStop(0,    '#ffc7a0');
    g.addColorStop(0.45, '#ffb088');
    g.addColorStop(1,    '#ffe7c2');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, GROUND_TOP);

    // soft sun glow
    const sx = W * 0.78, sy = 110;
    const sun = ctx.createRadialGradient(sx, sy, 0, sx, sy, 140);
    sun.addColorStop(0, 'rgba(255,255,220,.85)');
    sun.addColorStop(0.5, 'rgba(255,210,160,.35)');
    sun.addColorStop(1, 'rgba(255,210,160,0)');
    ctx.fillStyle = sun;
    ctx.fillRect(0, 0, W, GROUND_TOP);
    // sun disc
    ctx.fillStyle = '#fff4d0';
    ctx.beginPath(); ctx.arc(sx, sy, 28, 0, Math.PI * 2); ctx.fill();
  }

  // Chunky pixel cloud (rectangles, no anti-alias feel)
  function drawCloud(cx, cy, scale) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    ctx.fillStyle = 'rgba(255,255,255,.92)';
    // body of cloud — a few overlapping pixel rects
    const blocks = [
      [-26,-6,52,14],
      [-18,-14,36,10],
      [-30,2,60,10],
      [-10,-20,22,8],
      [12,-12,12,8],
    ];
    blocks.forEach(b => ctx.fillRect(b[0], b[1], b[2], b[3]));
    // soft shadow underside
    ctx.fillStyle = 'rgba(255,200,170,.55)';
    ctx.fillRect(-30, 8, 60, 4);
    ctx.restore();
  }

  function drawClouds() {
    for (const c of clouds) drawCloud(c.x, c.y, c.scale);
  }

  // One pair of knife obstacles
  function drawPipe(p) {
    const x = p.x;

    // TOP knife: flipped vertically, blade tip at gapY
    ctx.save();
    ctx.translate(x + PIPE_W / 2, p.gapY);
    ctx.scale(1, -1); // flip so blade points down
    // Draw so the bottom of sprite (blade tip in unflipped frame == top in flipped) sits at translate origin
    ctx.drawImage(knifeImg, -PIPE_W / 2, 0, PIPE_W, PIPE_H);
    ctx.restore();

    // BOTTOM knife: blade tip just below gap
    ctx.drawImage(knifeImg, x, p.gapY + PIPE_GAP, PIPE_W, PIPE_H);

    // subtle blade-glints near the tips
    ctx.fillStyle = 'rgba(255,255,255,.55)';
    ctx.fillRect(x + PIPE_W * 0.45, p.gapY - 6, 4, 4);
    ctx.fillRect(x + PIPE_W * 0.45, p.gapY + PIPE_GAP + 2, 4, 4);

    // Steak collectible floating in gap center
    if (p.hasSteak && !p.steakCollected) {
      const sx = x + PIPE_W / 2;
      const sy = p.gapY + PIPE_GAP / 2 + Math.sin(bobT * 0.003) * 5;
      const img = p.steakType === 'bbq' ? bbqImg : steakImg;
      ctx.drawImage(img, sx - STEAK_DRAW / 2, sy - STEAK_DRAW / 2, STEAK_DRAW, STEAK_DRAW);
    }
  }

  function drawPipes() {
    for (const p of pipes) drawPipe(p);
  }

  // Scrolling pixel ground
  function drawGround() {
    // dirt body
    ctx.fillStyle = '#d97a4a';
    ctx.fillRect(0, GROUND_TOP, W, GROUND_H);
    // grass strip
    ctx.fillStyle = '#f4b58a';
    ctx.fillRect(0, GROUND_TOP, W, 16);
    // top grass tufts (scrolling)
    ctx.fillStyle = '#b34a1f';
    for (let x = -groundOffset; x < W; x += 20) {
      ctx.fillRect(x, GROUND_TOP + 10, 10, 4);
    }
    // pixel rocks scattered (scrolling)
    ctx.fillStyle = '#a13d18';
    for (let x = -groundOffset * 2; x < W; x += 60) {
      ctx.fillRect(x + 8, GROUND_TOP + 36, 8, 6);
      ctx.fillRect(x + 32, GROUND_TOP + 56, 6, 4);
    }
    // top edge highlight
    ctx.fillStyle = 'rgba(255,255,255,.35)';
    ctx.fillRect(0, GROUND_TOP, W, 2);
  }

  function drawGoat() {
    ctx.save();
    ctx.translate(goat.x, goat.y);
    ctx.rotate(goat.rot);
    // slight pop when flapping
    const s = 1 + goat.flap * 0.08;
    ctx.scale(s, s);
    // drop shadow on ground when close
    ctx.drawImage(goatImg, -GOAT_DRAW_W / 2, -GOAT_DRAW_H / 2, GOAT_DRAW_W, GOAT_DRAW_H);
    ctx.restore();

    // ground shadow (separate, not rotated)
    if (state !== 'gameover') {
      const shadowY = GROUND_TOP - 2;
      const dist = clamp(1 - (shadowY - goat.y) / 240, 0.15, 0.7);
      ctx.fillStyle = `rgba(74,46,90,${dist * 0.35})`;
      ctx.beginPath();
      ctx.ellipse(goat.x, shadowY, 24 * dist + 14, 5 * dist + 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawSky();
    drawClouds();
    drawPipes();
    drawGround();
    drawGoat();
  }

  // ---------- LOOP ----------
  let lastT = 0;
  function loop(t) {
    const dt = lastT ? Math.min(40, t - lastT) : 16;
    lastT = t;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function start() {
    resize();
    initClouds();
    reset();
    setScreen('ready', true);
    setScoreVisible(false);
    requestAnimationFrame(loop);
  }
})();
</script>
</body>
</html>
