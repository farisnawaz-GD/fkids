<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="theme-color" content="#f4b58a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>GDIED</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    background: #2a1d2e;
    font-family: 'Press Start 2P', system-ui, sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
    overscroll-behavior: none;
    position: fixed;
    inset: 0;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at 30% 10%, #ffd2b0 0%, transparent 55%),
      radial-gradient(ellipse at 70% 90%, #a673c2 0%, transparent 60%),
      linear-gradient(180deg, #4a2e5a 0%, #2a1d2e 100%);
  }
  #stage {
    position: relative;
    /* Full-bleed by default (mobile-first) */
    width: 100vw;
    width: 100dvw;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }
  /* Desktop / large viewports: framed game-window, centered, with 9:16 aspect */
  @media (min-width: 700px) and (min-height: 700px) and (pointer: fine) {
    #stage {
      width: min(480px, calc(100dvh * 9 / 16));
      height: min(854px, calc(100vw * 16 / 9));
      max-width: 480px;
      max-height: 854px;
      box-shadow:
        0 0 0 4px #1a0f1f,
        0 0 0 8px #f4b58a,
        0 30px 80px rgba(0,0,0,.6),
        inset 0 0 0 1px rgba(255,255,255,.1);
      border-radius: 2px;
    }
  }
  canvas#game {
    display: block;
    width: 100%;
    height: 100%;
    background: #ffd000;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }

  /* HUD score (visible during play) */
  #score {
    position: absolute;
    top: max(5%, calc(env(safe-area-inset-top, 0px) + 14px));
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(24px, 7vw, 44px);
    color: #fff;
    text-shadow:
      3px 3px 0 #4a2e5a,
      -2px -2px 0 #4a2e5a,
      2px -2px 0 #4a2e5a,
      -2px 2px 0 #4a2e5a,
      0 6px 0 rgba(0,0,0,.25);
    letter-spacing: 2px;
    pointer-events: none;
    z-index: 4;
    transition: opacity .2s;
    opacity: 0;
  }
  #score.show { opacity: 1; }

  /* overlay screens */
  .screen {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6%;
    color: #4a2e5a;
  }
  .screen.show { display: flex; }
  .screen .panel {
    background: linear-gradient(180deg, #fff1d6 0%, #ffd6a8 100%);
    border: 4px solid #4a2e5a;
    box-shadow:
      0 0 0 4px #fff1d6,
      0 0 0 8px #4a2e5a,
      8px 12px 0 rgba(0,0,0,.25);
    padding: 28px 22px 22px;
    width: 86%;
    max-width: 340px;
    image-rendering: pixelated;
  }
  .screen h1 {
    font-size: clamp(20px, 6.5vw, 30px);
    color: #4a2e5a;
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-shadow: 3px 3px 0 #f4b58a;
  }
  .screen h2 {
    font-size: clamp(14px, 4.4vw, 20px);
    color: #4a2e5a;
    letter-spacing: 1px;
    margin-bottom: 18px;
  }
  .stats {
    display: flex;
    justify-content: space-around;
    gap: 10px;
    margin: 6px 0 18px;
  }
  .stat {
    background: #ffe6c2;
    border: 3px solid #4a2e5a;
    padding: 8px 10px;
    flex: 1;
  }
  .stat .lbl { font-size: 9px; color: #4a2e5a; opacity: .75; margin-bottom: 6px; letter-spacing: 1px; }
  .stat .val { font-size: clamp(16px, 5vw, 22px); color: #b34a1f; }
  .stat.best .val { color: #4a2e5a; }
  .stat.best.new .val::after {
    content: ' NEW!';
    font-size: 9px;
    color: #b34a1f;
    margin-left: 4px;
  }

  .btn {
    display: inline-block;
    margin-top: 6px;
    font-family: inherit;
    font-size: clamp(11px, 3.4vw, 14px);
    letter-spacing: 2px;
    color: #fff1d6;
    background: #b34a1f;
    border: 4px solid #4a2e5a;
    padding: 12px 22px;
    cursor: pointer;
    box-shadow:
      inset 0 -4px 0 rgba(0,0,0,.25),
      4px 6px 0 #4a2e5a;
    transition: transform .05s, box-shadow .05s;
  }
  .btn:active {
    transform: translate(3px, 4px);
    box-shadow:
      inset 0 -4px 0 rgba(0,0,0,.25),
      1px 2px 0 #4a2e5a;
  }
  /* flash on death */
  #flash {
    position: absolute;
    inset: 0;
    background: #ff0000;
    opacity: 0;
    pointer-events: none;
    z-index: 3;
  }
  #flash.flash { animation: flashAnim .4s ease-out; }
  @keyframes flashAnim {
    0% { opacity: .85; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="game"></canvas>
    <div id="flash"></div>
    <div id="score">0</div>

    <div id="ready" class="screen show">
      <div class="panel">
        <img src="assets/GD_mono.svg" alt="GD" style="width:64px;height:auto;display:block;margin:0 auto 10px;" />
        <h1>GDIED</h1>
        <h2>Mind the knives</h2>
        <div style="margin: 10px 0 14px; font-size: 10px; line-height: 1.8; color: #4a2e5a; opacity: .85;">
          Tap the goat.<br>
          Steer the goat between<br>the blades. Don't get sliced.
        </div>
        <button class="btn" id="playBtn">PLAY</button>
      </div>
    </div>

    <div id="gameover" class="screen">
      <div class="panel">
        <h1>GAME OVER</h1>
        <div class="stats">
          <div class="stat"><div class="lbl">SCORE</div><div class="val" id="finalScore">0</div></div>
          <div class="stat best" id="bestStat"><div class="lbl">BEST</div><div class="val" id="bestScore">0</div></div>
        </div>
        <button class="btn" id="retryBtn">PLAY AGAIN</button>
      </div>
    </div>
  </div>

<script>
(() => {
  // ---------- ASSETS (embedded) ----------
  const GOAT_SRC  = 'assets/goat.svg';
  const KNIFE_SRC = 'assets/knife.svg';
  const GRASS_SRC = 'assets/grass.svg';

  const goatImg  = new Image();
  const knifeImg = new Image();
  const grassImg = new Image();
  let assetsLoaded = 0;
  const onLoad = () => {
    assetsLoaded++;
    if (assetsLoaded === 3) start();
  };
  goatImg.onload  = goatImg.onerror  = onLoad;
  knifeImg.onload = knifeImg.onerror = onLoad;
  grassImg.onload = grassImg.onerror = onLoad;
  goatImg.src  = GOAT_SRC;
  knifeImg.src = KNIFE_SRC;
  grassImg.src = GRASS_SRC;

  // ---------- CANVAS SETUP ----------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // Logical playfield size. W stays fixed for consistent feel; H adapts to viewport aspect.
  const W = 400;
  let H = 711; // initial portrait default; recomputed in resize()

  function resize() {
    const stage = document.getElementById('stage');
    const rect = stage.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    const oldH = H;
    const aspect = rect.height / Math.max(1, rect.width);
    H = Math.round(W * aspect);
    H = Math.max(600, Math.min(1100, H));
    GROUND_TOP = H - GROUND_H;

    if (oldH && oldH !== H) {
      const r = H / oldH;
      if (typeof goat !== 'undefined' && goat) goat.y *= r;
      if (typeof pipes !== 'undefined') pipes.forEach(p => { p.gapY *= r; });
      if (typeof clouds !== 'undefined') clouds.forEach(c => { c.y *= r; });
    }

    canvas.width  = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
    ctx.imageSmoothingEnabled = true; // goat looks better smooth
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 100));

  const GROUND_H = 90;
  let   GROUND_TOP = H - GROUND_H;

  const GRAVITY = 0.42, JUMP_VEL = -7.6, MAX_FALL = 11;
  const PIPE_SPEED = 2.4, PIPE_GAP = 178, PIPE_INTERVAL_PX = 230;
  const PIPE_W = 70, PIPE_H = 320, PIPE_MIN_TOP = 70, PIPE_MIN_BOT = 70;
  const KNIFE_HITBOX_W = 36; // tighter than visual — feels fair
  const STEAK_DRAW = 38, STEAK_HIT = 28, STEAK_EVERY = 10;
  const GOAT_DRAW_W = 78, GOAT_DRAW_H = 62;
  const GOAT_HIT_W = 50, GOAT_HIT_H = 40; // tighter than sprite

  let state = 'ready';
  let score = 0;
  let best = (() => {
    try { return parseInt(localStorage.getItem('flappyGoatBest') || '0', 10) || 0; }
    catch (e) { return 0; }
  })();

  let goat = { x: 110, y: H * 0.45, vy: 0, rot: 0, flap: 0 };
  let pipes = [], clouds = [], stars = [], trees = [];
  let groundOffset = 0, bobT = 0;
  let nightT = 0, nightTarget = 0;

  function initStars() {
    stars = [];
    for (let i = 0; i < 40; i++) {
      stars.push({ x: Math.random() * W, y: Math.random() * (GROUND_TOP * 0.75), r: Math.random() * 1.5 + 0.5 });
    }
  }

  function reset() {
    nightT = 0;
    nightTarget = 0;
    goat = { x: 110, y: H * 0.45, vy: 0, rot: 0, flap: 0 };
    pipes = [];
    spawnPipe(W + 80);
    spawnPipe(W + 80 + PIPE_INTERVAL_PX);
    spawnPipe(W + 80 + PIPE_INTERVAL_PX * 2);
    score = 0;
    groundOffset = 0;
    setScoreVisible(false);
    updateScoreText();
  }

  function spawnPipe(x) {
    const minY = PIPE_MIN_TOP;
    const maxY = GROUND_TOP - PIPE_MIN_BOT - PIPE_GAP;
    const gapY = minY + Math.random() * (maxY - minY);
    pipes.push({ x, gapY, scored: false, hasSteak: false, steakCollected: false });
  }

  function initTrees() {
    trees = [];
    for (let i = 0; i < 7; i++) {
      trees.push({
        x: (W / 6) * i + Math.random() * 30,
        scale: 0.55 + Math.random() * 0.55,
        type: Math.random() < 0.35 ? 'bush' : 'tall',
      });
    }
  }

  // Generate some lazy clouds
  function initClouds() {
    clouds = [];
    for (let i = 0; i < 5; i++) {
      clouds.push({
        x: Math.random() * W,
        y: 40 + Math.random() * (GROUND_TOP - 200),
        scale: 0.6 + Math.random() * 0.8,
        speed: 0.15 + Math.random() * 0.25
      });
    }
  }

  function flap() {
    if (state === 'ready') {
      setScreen('ready', false);
      setScoreVisible(true);
      state = 'playing';
      goat.vy = JUMP_VEL;
      goat.flap = 1;
    } else if (state === 'playing') {
      goat.vy = JUMP_VEL;
      goat.flap = 1;
    } else if (state === 'gameover') {
      if (performance.now() - deathAt > 500) startGame();
    }
  }

  let deathAt = 0;

  function onPointer(e) {
    if (e.target && e.target.closest && e.target.closest('.btn,.screen .panel')) return;
    e.preventDefault();
    flap();
  }
  window.addEventListener('pointerdown', onPointer, { passive: false });
  document.addEventListener('touchend', e => {
    if (!e.target.closest('.btn')) e.preventDefault();
  }, { passive: false });
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      flap();
    }
  });

  // bfcache restores JS state mid-game — fully reset to ready screen
  window.addEventListener('pageshow', (e) => {
    if (e.persisted) {
      reset();
      state = 'ready';
      setScreen('gameover', false);
      setScreen('ready', true);
      setScoreVisible(false);
    }
  });

  document.getElementById('playBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    startGame();
  });
  document.getElementById('retryBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    startGame();
  });

  function startGame() {
    reset();
    setScreen('ready', false);
    setScreen('gameover', false);
    setScoreVisible(true);
    state = 'playing';
    goat.vy = JUMP_VEL;
    goat.flap = 1;
  }

  function setScreen(id, show) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.toggle('show', show);
  }
  function setScoreVisible(v) {
    document.getElementById('score').classList.toggle('show', v);
  }
  function updateScoreText() {
    document.getElementById('score').textContent = score;
  }
  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

  function update(dt) {
    bobT += dt;
    const ns = dt * 0.0006;
    if (nightTarget > nightT) nightT = Math.min(nightT + ns, nightTarget);
    else nightT = Math.max(nightT - ns, nightTarget);

    // Scroll clouds and trees in all active states
    clouds.forEach(c => { c.x -= c.speed; if (c.x < -60) { c.x = W + 60; c.y = 40 + Math.random() * (GROUND_TOP - 200); }});
    trees.forEach(t => { t.x -= PIPE_SPEED * 0.45; if (t.x < -90) { t.x = W + 60 + Math.random() * 80; t.scale = 0.55 + Math.random() * 0.55; t.type = Math.random() < 0.35 ? 'bush' : 'tall'; }});

    if (state === 'ready') {
      goat.y = H * 0.45 + Math.sin(bobT * 0.005) * 10;
      goat.rot = Math.sin(bobT * 0.005) * 0.08;
      groundOffset = (groundOffset + PIPE_SPEED * 0.5) % 40;
      return;
    }

    if (state === 'playing') {
      goat.vy = Math.min(goat.vy + GRAVITY, MAX_FALL);
      goat.y += goat.vy;
      goat.rot = clamp(goat.vy * 0.06, -0.35, 1.15);
      if (goat.flap > 0) goat.flap = Math.max(0, goat.flap - dt * 0.005);

      pipes.forEach(p => { p.x -= PIPE_SPEED; });
      const last = pipes[pipes.length - 1];
      if (last.x < W - PIPE_INTERVAL_PX) spawnPipe(last.x + PIPE_INTERVAL_PX);
      pipes = pipes.filter(p => p.x > -PIPE_W - 20);

      pipes.forEach(p => {
        if (!p.scored && p.x + PIPE_W / 2 < goat.x) {
          p.scored = true;
          score++;
          updateScoreText();
          if (score % STEAK_EVERY === 0) {
            const next = pipes.find(np => !np.scored && np.x > goat.x);
            if (next) { next.hasSteak = true; next.steakCollected = false; }
          }
          if (score % 20 === 0) nightTarget = 1 - nightTarget;
        }
      });

      groundOffset = (groundOffset + PIPE_SPEED) % 40;

      if (goat.y + GOAT_HIT_H / 2 >= GROUND_TOP) {
        goat.y = GROUND_TOP - GOAT_HIT_H / 2;
        gameOver();
        return;
      }
      // Ceiling: clamp, don't kill
      if (goat.y - GOAT_HIT_H / 2 < 0) {
        goat.y = GOAT_HIT_H / 2;
        if (goat.vy < 0) goat.vy = 0;
      }

      const gx = goat.x, gy = goat.y;
      const gL = gx - GOAT_HIT_W / 2, gR = gx + GOAT_HIT_W / 2;
      const gT = gy - GOAT_HIT_H / 2, gB = gy + GOAT_HIT_H / 2;
      for (const p of pipes) {
        const kL = p.x + (PIPE_W - KNIFE_HITBOX_W) / 2;
        const kR = kL + KNIFE_HITBOX_W;
        if (gR < kL || gL > kR) continue;
        if (gT < p.gapY) { gameOver(); return; }
        if (gB > p.gapY + PIPE_GAP) { gameOver(); return; }
      }

      const half = STEAK_HIT / 2;
      for (const p of pipes) {
        if (!p.hasSteak || p.steakCollected) continue;
        const sx = p.x + PIPE_W / 2, sy = p.gapY + PIPE_GAP / 2;
        if (gR > sx - half && gL < sx + half && gB > sy - half && gT < sy + half) {
          p.steakCollected = true;
          score += 5;
          updateScoreText();
        }
      }
    }

    if (state === 'gameover') {
      if (goat.y + GOAT_HIT_H / 2 < GROUND_TOP) {
        goat.vy = Math.min(goat.vy + GRAVITY, MAX_FALL);
        goat.y += goat.vy;
        goat.rot = clamp(goat.rot + 0.04, -0.35, 1.5);
      } else {
        goat.y = GROUND_TOP - GOAT_HIT_H / 2;
      }
    }
  }

  function gameOver() {
    if (state === 'gameover') return;
    state = 'gameover';
    deathAt = performance.now();
    const f = document.getElementById('flash');
    f.classList.remove('flash');
    void f.offsetWidth;
    f.classList.add('flash');

    const isNew = score > best;
    if (isNew) {
      best = score;
      try { localStorage.setItem('flappyGoatBest', String(best)); } catch (e) {}
    }
    document.getElementById('finalScore').textContent = score;
    document.getElementById('bestScore').textContent = best;
    document.getElementById('bestStat').classList.toggle('new', isNew);

    setTimeout(() => {
      setScoreVisible(false);
      setScreen('gameover', true);
    }, 650);
  }

  function lc(dr,dg,db, nr,ng,nb, t) {
    return `rgb(${~~(dr+(nr-dr)*t)},${~~(dg+(ng-dg)*t)},${~~(db+(nb-db)*t)})`;
  }

  function drawTree(tx, scale, type) {
    const nt = nightT;
    const cTrunk  = lc(122,74,40,  20,10, 4, nt);
    const cShade  = lc( 55,98,22,   8,18, 4, nt);
    const cMid    = lc( 70,124,32,  12,24, 6, nt);
    const cBright = lc( 86,152,40,  16,30, 8, nt);
    const cTop    = lc(108,180,52,  20,38,10, nt);

    ctx.save();
    ctx.translate(tx, GROUND_TOP);
    ctx.scale(scale, scale);

    if (type === 'bush') {
      ctx.fillStyle = cTrunk;
      ctx.fillRect(-4, -18, 8, 18);
      ctx.fillStyle = cShade;
      ctx.fillRect(-24, -36, 48, 14);
      ctx.fillStyle = cMid;
      ctx.fillRect(-20, -50, 40, 16);
      ctx.fillStyle = cBright;
      ctx.fillRect(-14, -60, 28, 12);
      ctx.fillStyle = cTop;
      ctx.fillRect(-8, -68, 16, 10);
    } else {
      ctx.fillStyle = cTrunk;
      ctx.fillRect(-5, -42, 10, 42);
      ctx.fillStyle = cShade;
      ctx.fillRect(-22, -58, 44, 16);
      ctx.fillStyle = cMid;
      ctx.fillRect(-18, -72, 36, 16);
      ctx.fillRect(-14, -84, 28, 14);
      ctx.fillStyle = cBright;
      ctx.fillRect(-10, -94, 20, 12);
      ctx.fillStyle = cTop;
      ctx.fillRect(-6, -104, 12, 12);
    }

    ctx.restore();
  }

  function drawTrees() {
    for (const t of trees) drawTree(t.x, t.scale, t.type);
  }

  function drawSky() {
    const g = ctx.createLinearGradient(0, 0, 0, GROUND_TOP);
    g.addColorStop(0,   '#ffd000');
    g.addColorStop(0.5, '#ffcf00');
    g.addColorStop(1,   '#ffe040');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, GROUND_TOP);

    ctx.globalAlpha = 1 - nightT;
    const sx = W * 0.78, sy = 80;
    const sun = ctx.createRadialGradient(sx, sy, 0, sx, sy, 110);
    sun.addColorStop(0,   'rgba(255,255,255,.95)');
    sun.addColorStop(0.4, 'rgba(255,255,200,.40)');
    sun.addColorStop(1,   'rgba(255,255,180,0)');
    ctx.fillStyle = sun;
    ctx.fillRect(0, 0, W, GROUND_TOP);
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(sx, sy, 26, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;

    if (nightT > 0) {
      ctx.globalAlpha = nightT;
      const ng = ctx.createLinearGradient(0, 0, 0, GROUND_TOP);
      ng.addColorStop(0,   '#05051e');
      ng.addColorStop(0.5, '#0d0d3a');
      ng.addColorStop(1,   '#1a0f2e');
      ctx.fillStyle = ng;
      ctx.fillRect(0, 0, W, GROUND_TOP);

      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      for (const s of stars) {
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
      }
      const mx = W * 0.78, my = 90;
      const moonGlow = ctx.createRadialGradient(mx, my, 0, mx, my, 80);
      moonGlow.addColorStop(0, 'rgba(220,220,180,.25)');
      moonGlow.addColorStop(1, 'rgba(220,220,180,0)');
      ctx.fillStyle = moonGlow;
      ctx.fillRect(0, 0, W, GROUND_TOP);
      ctx.fillStyle = '#f0f0d0';
      ctx.beginPath(); ctx.arc(mx, my, 26, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(160,160,120,0.45)';
      ctx.beginPath(); ctx.arc(mx + 8, my - 6, 7, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(mx - 8, my + 8, 4, 0, Math.PI * 2); ctx.fill();

      ctx.globalAlpha = 1;
    }
  }

  function drawCloud(cx, cy, scale) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    const cr = Math.round(255 + (160 - 255) * nightT);
    const cg = Math.round(255 + (160 - 255) * nightT);
    const cb = Math.round(255 + (200 - 255) * nightT);
    const ca = (0.92 + (0.25 - 0.92) * nightT).toFixed(2);
    ctx.fillStyle = `rgba(${cr},${cg},${cb},${ca})`;
    const blocks = [
      [-26,-6,52,14],
      [-18,-14,36,10],
      [-30,2,60,10],
      [-10,-20,22,8],
      [12,-12,12,8],
    ];
    blocks.forEach(([bx,by,bw,bh]) => ctx.fillRect(bx, by, bw, bh));
    const sa = (0.45 * (1 - nightT)).toFixed(2);
    ctx.fillStyle = `rgba(200,210,220,${sa})`;
    ctx.fillRect(-30, 8, 60, 4);
    ctx.restore();
  }

  function drawClouds() {
    for (const c of clouds) drawCloud(c.x, c.y, c.scale);
  }

  function drawPipe(p) {
    const x = p.x;

    ctx.save();
    ctx.translate(x + PIPE_W / 2, p.gapY);
    ctx.scale(1, -1); // flip so blade points down
    ctx.drawImage(knifeImg, -PIPE_W / 2, 0, PIPE_W, PIPE_H);
    ctx.restore();

    ctx.drawImage(knifeImg, x, p.gapY + PIPE_GAP, PIPE_W, PIPE_H);

    ctx.fillStyle = 'rgba(255,255,255,.55)';
    ctx.fillRect(x + PIPE_W * 0.45, p.gapY - 6, 4, 4);
    ctx.fillRect(x + PIPE_W * 0.45, p.gapY + PIPE_GAP + 2, 4, 4);

    if (p.hasSteak && !p.steakCollected) {
      const sx = x + PIPE_W / 2;
      const sy = p.gapY + PIPE_GAP / 2 + Math.sin(bobT * 0.003) * 5;
      ctx.drawImage(grassImg, sx - STEAK_DRAW / 2, sy - STEAK_DRAW / 2, STEAK_DRAW, STEAK_DRAW);
    }
  }

  function drawPipes() {
    for (const p of pipes) drawPipe(p);
  }

  function drawGround() {
    ctx.fillStyle = '#8b5e3c';
    ctx.fillRect(0, GROUND_TOP, W, GROUND_H);
    ctx.fillStyle = '#4a8c2a';
    ctx.fillRect(0, GROUND_TOP, W, 16);
    ctx.fillStyle = '#3a6e1e';
    for (let x = -groundOffset; x < W; x += 20) ctx.fillRect(x, GROUND_TOP + 10, 10, 5);
    ctx.fillStyle = '#6e4828';
    for (let x = -groundOffset * 2; x < W; x += 60) {
      ctx.fillRect(x + 8,  GROUND_TOP + 36, 8, 6);
      ctx.fillRect(x + 32, GROUND_TOP + 56, 6, 4);
    }
    ctx.fillStyle = 'rgba(255,255,255,.25)';
    ctx.fillRect(0, GROUND_TOP, W, 2);
  }

  function drawGoat() {
    ctx.save();
    ctx.translate(goat.x, goat.y);
    ctx.rotate(goat.rot);
    const s = 1 + goat.flap * 0.08;
    ctx.scale(s, s);
    ctx.drawImage(goatImg, -GOAT_DRAW_W / 2, -GOAT_DRAW_H / 2, GOAT_DRAW_W, GOAT_DRAW_H);
    ctx.restore();

    if (state !== 'gameover') {
      const shadowY = GROUND_TOP - 2;
      const dist = clamp(1 - (shadowY - goat.y) / 240, 0.15, 0.7);
      ctx.fillStyle = `rgba(74,46,90,${dist * 0.35})`;
      ctx.beginPath();
      ctx.ellipse(goat.x, shadowY, 24 * dist + 14, 5 * dist + 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawSky();
    drawTrees();
    drawClouds();
    drawPipes();
    drawGround();
    drawGoat();
  }

  let lastT = 0;
  function loop(t) {
    const dt = lastT ? Math.min(40, t - lastT) : 16;
    lastT = t;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function start() {
    resize();
    initClouds();
    initTrees();
    initStars();
    reset();
    setScreen('ready', true);
    setScoreVisible(false);
    requestAnimationFrame(loop);
  }
})();
</script>
</body>
</html>
